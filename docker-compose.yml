services:
  db:
    image: postgres:17.9-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 2s
      timeout: 5s
      retries: 5

  api:
    image: ${API_IMAGE:-ms-utrustning-api}
    build:
      context: ./api
      target: ${BUILD_TARGET:-production}
    ports:
      - "127.0.0.1:${API_PORT:-8080}:8080"
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?sslmode=disable
      ADDR: ":8080"
      DEV_MODE: ${DEV_MODE}
      JWKS_URL: ${JWKS_URL}
      DEV_PERSONAS_PATH: /config/dev-personas.json
      IMAGE_DIR: /data/images
    volumes:
      - ./dev-personas.json:/config/dev-personas.json:ro
      - images:/data/images
    depends_on:
      db:
        condition: service_healthy

  web:
    image: ${WEB_IMAGE:-ms-utrustning-web}
    build:
      context: ./web
      target: ${BUILD_TARGET:-production}
    ports:
      - "${WEB_PORT:-3000}:3000"
    environment:
      ORIGIN: ${ORIGIN}
      API_URL: http://api:8080
      DEV_MODE: ${DEV_MODE}
      DEMO_MODE: ${DEMO_MODE:-false}
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_KEYCLOAK_ID: ${AUTH_KEYCLOAK_ID}
      AUTH_KEYCLOAK_SECRET: ${AUTH_KEYCLOAK_SECRET}
      AUTH_KEYCLOAK_ISSUER: ${AUTH_KEYCLOAK_ISSUER}
      AUTH_TRUST_HOST: "true"
    volumes:
      - ./dev-personas.json:/app/dev-personas.json:ro
      - ./docs/guide.md:/app/guide.md:ro
    depends_on:
      - api

volumes:
  pgdata:
  images:
