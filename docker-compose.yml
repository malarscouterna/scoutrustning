services:
  db:
    image: postgres:17.9-alpine
    environment:
      POSTGRES_USER: utrustning
      POSTGRES_PASSWORD: utrustning
      POSTGRES_DB: utrustning
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U utrustning"]
      interval: 2s
      timeout: 5s
      retries: 5

  api:
    build: ./api
    ports:
      - "8080:8080"
    volumes:
      - ./dev-personas.json:/app/dev-personas.json:ro
    environment:
      DATABASE_URL: postgres://utrustning:utrustning@db:5432/utrustning?sslmode=disable
      ADDR: ":8080"
      DEV_MODE: "true"
      DEV_PERSONAS_PATH: /app/dev-personas.json
      MIGRATIONS_DIR: /migrations
    depends_on:
      db:
        condition: service_healthy

  web:
    build: ./web
    ports:
      - "3000:3000"
    volumes:
      - ./dev-personas.json:/app/dev-personas.json:ro
    environment:
      ORIGIN: http://localhost:3000
      API_URL: http://api:8080
      DEV_MODE: "true"
    depends_on:
      - api

volumes:
  pgdata:
