name: Build on Release

on:
  release:
    types: [published]

env:
  REGISTRY: ghcr.io
  API_IMAGE: ghcr.io/malarscouterna/scoutrustning-api
  WEB_IMAGE: ghcr.io/malarscouterna/scoutrustning-web

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v7

      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v7
        with:
          context: ./api
          push: true
          tags: |
            ${{ env.API_IMAGE }}:latest
            ${{ env.API_IMAGE }}:${{ github.event.release.tag_name }}

      - uses: docker/build-push-action@v7
        with:
          context: .
          file: web/Dockerfile
          target: production
          push: true
          tags: |
            ${{ env.WEB_IMAGE }}:latest
            ${{ env.WEB_IMAGE }}:${{ github.event.release.tag_name }}
