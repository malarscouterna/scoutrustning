version: 2
updates:
  - package-ecosystem: gomod
    directory: /api
    schedule:
      interval: weekly
    groups:
      go-deps:
        patterns:
          - "*"

  - package-ecosystem: npm
    directory: /web
    schedule:
      interval: weekly
    groups:
      npm-deps:
        patterns:
          - "*"

  - package-ecosystem: docker
    directory: /api
    schedule:
      interval: weekly

  - package-ecosystem: docker
    directory: /web
    schedule:
      interval: weekly

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
